<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genius Music Search</title>
    <link rel="stylesheet" href="styles/styles.css">
    <script type="module" src="app.js"></script>
</head>
<body>
    <div id="app">
        <header>
            <div class="header-content">
                <div class="header-title">
                    <h1>Lyrics Search</h1>
                </div>
                <p class="header-subtitle">
                    <a href="https://genius.com" target="_blank" rel="noopener noreferrer">
                        Powered by Genius
                        <img src="styles/genius-logo.jpeg" alt="Genius Logo" class="genius-logo-subtitle">
                    </a>
                </p>
                <div id="search-bar-container"></div>
            </div>
        </header>
        <main>
            <div id="results-list-container"></div>
            <div id="artist-view-container" style="display: none;"></div>
        </main>
    </div>
</body>
</html>
